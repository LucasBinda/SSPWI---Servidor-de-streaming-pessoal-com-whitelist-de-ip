<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistindo — Sala de projeção</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="player-header">
    <a class="back-link" href="/">&larr; Voltar ao catálogo</a>
  </div>

  <div class="player-wrap">
    <video id="video-player" controls autoplay></video>
    <h1 class="marquee-font" id="titulo-filme"></h1>
    <p id="descricao-filme"></p>
  </div>

  <!--
    Única dependência de terceiros do projeto. Reproduzir HLS sem isso exigiria
    reimplementar parser de .m3u8 + Media Source Extensions do zero — o Safari
    tem suporte nativo (por isso o player.js checa canPlayType antes de usar
    isso), mas Chrome/Firefox não. Se preferir remover, o player.js cai pra
    "não suportado" nesses navegadores.
  -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <script src="/js/player.js"></script>
</body>
</html>
