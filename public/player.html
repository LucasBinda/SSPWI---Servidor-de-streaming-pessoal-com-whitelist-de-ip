<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistindo — Sala de projeção</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="player-header">
    <a class="back-link" href="/">&larr; Voltar ao catálogo</a>
  </div>

  <div class="player-wrap">
    <div class="video-shell">
      <!-- nofullscreen: o botão nativo só amplia o <video>, o que esconderia a
           legenda desenhada pelo player (camada .legenda-overlay). A tela cheia
           de verdade fica no painel de configurações, ampliando o shell inteiro. -->
      <video id="video-player" controls autoplay controlslist="nofullscreen"></video>

      <div id="legenda-overlay" class="legenda-overlay" hidden></div>

      <button id="btn-config" class="btn-config" type="button" aria-label="Configurações do player" aria-expanded="false">⚙</button>

      <div id="painel-config" class="painel-config" hidden>
        <div class="painel-secao">
          <span class="rotulo-secao">Tela</span>
          <div class="linha-botoes">
            <button id="btn-modo-retrato" type="button" class="btn-painel" aria-pressed="false" title="O filme ocupa a janela inteira do navegador (Esc sai)">Modo retrato</button>
            <button id="btn-tela-cheia" type="button" class="btn-painel" title="Tela cheia (Esc sai)">Tela cheia</button>
          </div>
        </div>

        <div class="painel-secao">
          <span class="rotulo-secao">Ajuste de imagem</span>
          <div class="linha-botoes" role="group" aria-label="Ajuste de imagem no modo retrato e tela cheia">
            <button type="button" class="btn-painel btn-ajuste" data-ajuste="original" aria-pressed="true" title="Imagem completa, com bordas pretas se a proporção não bater">Original</button>
            <button type="button" class="btn-painel btn-ajuste" data-ajuste="preencher" aria-pressed="false" title="Amplia até ocupar a tela, cortando as beiradas da imagem">Preencher</button>
            <button type="button" class="btn-painel btn-ajuste" data-ajuste="esticar" aria-pressed="false" title="Ocupa a tela deformando a proporção da imagem">Esticar</button>
          </div>
        </div>

        <div class="painel-secao">
          <label for="select-audio">Áudio</label>
          <select id="select-audio"></select>
        </div>

        <div class="painel-secao">
          <label for="select-legenda">Legenda</label>
          <select id="select-legenda">
            <option value="">Nenhuma</option>
          </select>
        </div>

        <div class="painel-secao">
          <div class="linha-toggle">
            <label for="toggle-equalizador">Equalizador de áudio</label>
            <input type="checkbox" id="toggle-equalizador" class="switch" role="switch">
          </div>
          <div id="painel-equalizador" class="painel-equalizador" hidden></div>
        </div>
      </div>
    </div>

    <h1 class="marquee-font" id="titulo-filme"></h1>
    <p id="descricao-filme"></p>
  </div>

  <script src="/js/auth.js"></script>
  <script type="module" src="/js/player.js"></script>
</body>
</html>
